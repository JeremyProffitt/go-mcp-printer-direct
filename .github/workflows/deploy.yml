name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Run Tests
        run: go test ./... -v

      - name: Build Go binary
        run: |
          cd cmd/lambda
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -tags lambda.norpc -o bootstrap .
          ls -la bootstrap

      - name: SAM Deploy
        env:
          ADMIN_USER: ${{ vars.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
          CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN_US_EAST_2 }}
          JWT_SIGNING_KEY_ARN: ${{ secrets.JWT_SIGNING_KEY_ARN }}
          WG_CONFIG_SECRET_ARN: ${{ secrets.WG_CONFIG_SECRET_ARN }}
          CF_BUCKET: ${{ vars.CLOUDFORMATION_S3_BUCKET }}
          PRINTER_IP: ${{ vars.PRINTER_IP }}
        run: |
          python3 << 'PYEOF'
          import os

          params = {
            'AdminUser': os.environ['ADMIN_USER'],
            'AdminPassword': os.environ['ADMIN_PASSWORD'],
            'DomainName': os.environ.get('DOMAIN_NAME', 'mcp-printer.jeremy.ninja'),
            'HostedZoneId': os.environ['HOSTED_ZONE_ID'],
            'CertificateArn': os.environ['CERTIFICATE_ARN'],
            'OtelEndpoint': 'http://192.168.1.202:4318',
            'PrinterIp': os.environ.get('PRINTER_IP', '192.168.1.118'),
          }
          if os.environ.get('JWT_SIGNING_KEY_ARN'):
            params['JwtSigningKeyArn'] = os.environ['JWT_SIGNING_KEY_ARN']
          if os.environ.get('WG_CONFIG_SECRET_ARN'):
            params['WgConfigSecretArn'] = os.environ['WG_CONFIG_SECRET_ARN']

          with open('params.yaml', 'w') as f:
            for k, v in params.items():
              f.write(f"{k}: '{v}'\n")
          PYEOF

          sam deploy \
            --template-file template.yaml \
            --stack-name mcp-printer-direct-stack \
            --s3-bucket "$CF_BUCKET" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides file://params.yaml

      - name: Output Stack Info
        run: |
          aws cloudformation describe-stacks \
            --stack-name mcp-printer-direct-stack \
            --query 'Stacks[0].Outputs' \
            --output table
